prometheus:
  prometheusSpec:
    retention: 30d
    retentionSize: 50GB
    resources:
      requests: { cpu: 500m, memory: 1Gi }
      limits:   { cpu: "2",  memory: 4Gi }
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: gp3
          accessModes: [ReadWriteOnce]
          resources:
            requests:
              storage: 50Gi
    additionalScrapeConfigs:
      - job_name: agroconnect-backend
        static_configs:
          - targets: ["backend.agroconnect.svc.cluster.local:4000"]
        metrics_path: /metrics

grafana:
  enabled: true
  adminPassword: "" # set via secret
  persistence:
    enabled: true
    size: 10Gi
    storageClassName: gp3
  resources:
    requests: { cpu: 250m, memory: 256Mi }
    limits:   { cpu: "1",  memory: 512Mi }
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: agroconnect
          folder: AgroConnect
          type: file
          options:
            path: /var/lib/grafana/dashboards/agroconnect
  dashboards:
    agroconnect:
      app-dashboard:
        url: https://raw.githubusercontent.com/your-org/agroconnect/main/k8s/monitoring/grafana/dashboards/agroconnect.json

alertmanager:
  alertmanagerSpec:
    resources:
      requests: { cpu: 100m, memory: 128Mi }
      limits:   { cpu: 200m, memory: 256Mi }
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: [alertname, namespace]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: slack
      routes:
        - match: { severity: critical }
          receiver: pagerduty
    receivers:
      - name: slack
        slack_configs:
          - api_url: "{{ .SlackWebhookURL }}"
            channel: "#agroconnect-alerts"
            title: "{{ .GroupLabels.alertname }}"
            text: "{{ range .Alerts }}{{ .Annotations.description }}\n{{ end }}"
      - name: pagerduty
        pagerduty_configs:
          - routing_key: "{{ .PagerDutyKey }}"

nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true
