networks:
  agronet:
    driver: bridge

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:

services:
  # ── PostgreSQL ──────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: agro-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: agroconnect
      POSTGRES_USER: agro_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localdev_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - agronet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agro_user -d agroconnect"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ─────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: agro-backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://agro_user:${POSTGRES_PASSWORD:-localdev_secret}@postgres:5432/agroconnect
      FRONTEND_URL: http://localhost:8080
      HUBTEL_CLIENT_ID: ${HUBTEL_CLIENT_ID:-}
      HUBTEL_CLIENT_SECRET: ${HUBTEL_CLIENT_SECRET:-}
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - agronet
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Frontend ────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        VITE_API_URL: http://localhost:4000
    container_name: agro-frontend
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - agronet

  # ── Prometheus ──────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: agro-prometheus
    restart: unless-stopped
    volumes:
      - ./k8s/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    networks:
      - agronet

  # ── Grafana ─────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.1.0
    container_name: agro-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin123}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./k8s/monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./k8s/monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - agronet
