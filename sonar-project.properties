sonar.projectKey=agroconnect-ghana
sonar.organization=yormengh
sonar.projectName=AgroConnect Ghana
sonar.projectVersion=1.0

# Source paths
sonar.sources=frontend/src,backend
sonar.exclusions=**/node_modules/**,**/dist/**,**/*.test.js,**/*.spec.js,**/coverage/**

# Test paths
sonar.tests=backend/tests
sonar.test.inclusions=**/*.test.js,**/*.spec.js

# Coverage
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Language
sonar.sourceEncoding=UTF-8

# Security hotspot rules
sonar.security.sources.javasecurity=true
