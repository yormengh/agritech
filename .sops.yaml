# .sops.yaml — SOPS encryption rules
# Encrypt Kubernetes secret files and .env files using AWS KMS
# Usage: sops -e -i k8s/base/postgres/secrets-local.yaml

creation_rules:
  # Kubernetes Secret manifests → encrypt with KMS
  - path_regex: k8s/.*secrets.*\.yaml$
    aws_profile: default
    kms: "arn:aws:kms:us-east-2:794038236323:alias/agroconnect-prod-eks"

  # Terraform tfvars with sensitive values
  - path_regex: terraform/.*\.tfvars$
    aws_profile: default
    kms: "arn:aws:kms:us-east-2:794038236323:alias/agroconnect-prod-eks"

  # Local .env files (never commit unencrypted)
  - path_regex: \.env(\..+)?$
    aws_profile: default
    kms: "arn:aws:kms:us-east-2:794038236323:alias/agroconnect-prod-eks"
