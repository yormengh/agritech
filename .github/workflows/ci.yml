name: CI — Build, Scan & Push

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  id-token: write       # OIDC for AWS
  contents: read
  security-events: write # upload SARIF to GitHub Security
  pull-requests: write   # post PR comments

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-2
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-2.amazonaws.com
  CLUSTER_NAME: agroconnect-prod
  NODE_VERSION: "20"

jobs:
  # ── 1. Secret Detection ──────────────────────────────────────────
  secret-scan:
    name: Secret Detection (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # ── 2. Dependency Audit ──────────────────────────────────────────
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Audit frontend dependencies
        working-directory: frontend
        run: npm audit --audit-level=high
        continue-on-error: false

      - name: Audit backend dependencies
        working-directory: backend
        run: npm audit --audit-level=high
        continue-on-error: false

      - name: Install frontend deps for Snyk
        working-directory: frontend
        run: npm ci

      - name: Snyk frontend scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --file=frontend/package.json
        continue-on-error: true

      - name: Install backend deps for Snyk
        working-directory: backend
        run: npm ci

      - name: Snyk backend scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --file=backend/package.json
        continue-on-error: true

  # ── 3. SAST — Semgrep ────────────────────────────────────────────
  sast-semgrep:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          semgrep ci \
            --config=auto \
            --sarif \
            --output=semgrep.sarif || true
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
        if: always() && hashFiles('semgrep.sarif') != ''

  # ── 4. SonarCloud SAST ───────────────────────────────────────────
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install & build
        working-directory: frontend
        run: npm ci && npm run build --if-present

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ── 5. Lint & Unit Tests ─────────────────────────────────────────
  test:
    name: Lint & Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: agroconnect_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Run backend tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/agroconnect_test
          NODE_ENV: test
          ADMIN_PASSWORD: test_admin_password
        run: npm test --if-present

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint --if-present

  # ── 6. IaC Security — Checkov ────────────────────────────────────
  iac-scan:
    name: IaC Security (Checkov)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Checkov
        run: pip install checkov

      - name: Checkov Terraform scan
        run: |
          checkov -d terraform/ --framework terraform \
            --skip-check CKV_AWS_130,CKV_AWS_39,CKV_AWS_38,CKV_AWS_157,CKV_AWS_293,CKV_AWS_338,CKV_AWS_158,CKV_AWS_382,CKV_AWS_23,CKV2_AWS_12,CKV2_AWS_64,CKV_AWS_355,CKV_AWS_290,CKV_AWS_161,CKV_AWS_118,CKV_AWS_337,CKV2_AWS_69 \
            --output sarif --output-file-path checkov-terraform.sarif \
            --soft-fail || true

      - name: Checkov K8s scan
        run: |
          checkov -d k8s/ --framework kubernetes \
            --output sarif --output-file-path checkov-k8s.sarif \
            --soft-fail || true

      - name: Upload Checkov SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: checkov-terraform.sarif
        if: always()

  # ── 7. Build Docker Images ───────────────────────────────────────
  build:
    name: Build Images
    runs-on: ubuntu-latest
    needs: [secret-scan, dependency-audit, sast-semgrep, test]
    outputs:
      frontend-image: ${{ steps.meta-frontend.outputs.tags }}
      backend-image: ${{ steps.meta-backend.outputs.tags }}
      image-tag: ${{ steps.tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "tag=sha-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Frontend ──
      - name: Frontend image metadata
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ECR_REGISTRY }}/${{ env.CLUSTER_NAME }}/frontend
          tags: |
            type=sha,prefix=sha-

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
          provenance: true
          sbom: true

      # ── Backend ──
      - name: Backend image metadata
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ECR_REGISTRY }}/${{ env.CLUSTER_NAME }}/backend
          tags: |
            type=sha,prefix=sha-

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

  # ── 8. Container Vulnerability Scan — Trivy ──────────────────────
  trivy-scan:
    name: Container Scan (Trivy)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Trivy scan — frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/${{ env.CLUSTER_NAME }}/frontend:${{ needs.build.outputs.image-tag }}
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"
          ignore-unfixed: true

      - name: Trivy scan — backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/${{ env.CLUSTER_NAME }}/backend:${{ needs.build.outputs.image-tag }}
          format: sarif
          output: trivy-backend.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"
          ignore-unfixed: true

      - name: Upload Trivy SARIFs
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-frontend
        if: always()

      - name: Upload Trivy backend SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-backend
        if: always()

  # ── 9. Update Kustomize image tags → triggers ArgoCD ─────────────
  update-manifests:
    name: Update K8s Manifests
    runs-on: ubuntu-latest
    needs: [build, trivy-scan]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GIT_BOT_TOKEN }}

      - name: Determine overlay
        id: overlay
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "overlay=production" >> $GITHUB_OUTPUT
            echo "env=production" >> $GITHUB_OUTPUT
          else
            echo "overlay=staging" >> $GITHUB_OUTPUT
            echo "env=staging" >> $GITHUB_OUTPUT
          fi

      - name: Install kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Update image tags
        run: |
          TAG=${{ needs.build.outputs.image-tag }}
          OVERLAY=${{ steps.overlay.outputs.overlay }}
          cd k8s/overlays/${OVERLAY}

          kustomize edit set image \
            FRONTEND_IMAGE=${{ env.ECR_REGISTRY }}/${{ env.CLUSTER_NAME }}/frontend:${TAG}

          kustomize edit set image \
            BACKEND_IMAGE=${{ env.ECR_REGISTRY }}/${{ env.CLUSTER_NAME }}/backend:${TAG}

      - name: Commit & push manifest update
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/overlays/
          git commit -m "ci: update ${{ steps.overlay.outputs.env }} images to ${{ needs.build.outputs.image-tag }} [skip ci]" || echo "No changes"
          git push
