apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: agroconnect-staging

bases:
  - ../../base/frontend
  - ../../base/backend

resources:
  - namespace.yaml

images:
  - name: FRONTEND_IMAGE
    newName: 794038236323.dkr.ecr.us-east-2.amazonaws.com/agroconnect-prod/frontend
    newTag: develop
  - name: BACKEND_IMAGE
    newName: 794038236323.dkr.ecr.us-east-2.amazonaws.com/agroconnect-prod/backend
    newTag: develop

patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: frontend
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: backend

commonLabels:
  environment: staging

configMapGenerator:
  - name: backend-config
    behavior: merge
    literals:
      - frontend-url=https://staging.agroconnect.gh
      - node-env=staging
