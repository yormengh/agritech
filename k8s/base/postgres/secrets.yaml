---
# External Secrets Operator — pulls DB credentials from AWS SSM
# Requires: external-secrets.io/v1beta1 CRD installed in cluster
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-ssm
  namespace: agroconnect
spec:
  provider:
    aws:
      service: ParameterStore
      region: us-east-2
      auth:
        jwt:
          serviceAccountRef:
            name: backend    # IRSA-annotated SA in backend deployment

---
# Pull backend secrets from SSM Parameter Store
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: backend-secrets
  namespace: agroconnect
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-ssm
    kind: SecretStore
  target:
    name: backend-secrets          # k8s Secret name created/synced
    creationPolicy: Owner
    template:
      type: Opaque
      engineVersion: v2
      data:
        database-url: "{{ .database_url }}"
        hubtel-client-id: "{{ .hubtel_client_id }}"
        hubtel-client-secret: "{{ .hubtel_client_secret }}"
  data:
    - secretKey: database_url
      remoteRef:
        key: /agroconnect-prod/database/url
    - secretKey: hubtel_client_id
      remoteRef:
        key: /agroconnect-prod/hubtel/client-id
    - secretKey: hubtel_client_secret
      remoteRef:
        key: /agroconnect-prod/hubtel/client-secret

---
# Fallback: manual Secret for local/bootstrap use (base64-encoded placeholders)
# In production this is REPLACED by ExternalSecret above.
# Never commit real values here — use SOPS or sealed-secrets if needed locally.
apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets-local
  namespace: agroconnect
  annotations:
    note: "Replace with ExternalSecret in production. This is for local k8s only."
type: Opaque
stringData:
  database-url:         "postgresql://agro_user:CHANGEME@postgres:5432/agroconnect"
  hubtel-client-id:     ""
  hubtel-client-secret: ""
