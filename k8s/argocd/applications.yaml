---
# Root ArgoCD Application — app-of-apps pattern
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: agroconnect-root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: agroconnect
  source:
    repoURL: https://github.com/yormengh/agritech.git
    targetRevision: main
    path: k8s/argocd
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground

---
# ArgoCD Project
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: agroconnect
  namespace: argocd
spec:
  description: AgroConnect Ghana application project
  sourceRepos:
    - "https://github.com/yormengh/agritech.git"
  destinations:
    - namespace: agroconnect
      server: https://kubernetes.default.svc
    - namespace: monitoring
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
  roles:
    - name: developer
      description: Read-only access for developers
      policies:
        - p, proj:agroconnect:developer, applications, get, agroconnect/*, allow
      groups:
        - developers

---
# Production application
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: agroconnect-production
  namespace: argocd
  annotations:
    notifications.argoproj.io/subscribe.on-deployed.slack: agroconnect-deployments
    notifications.argoproj.io/subscribe.on-sync-failed.slack: agroconnect-alerts
spec:
  project: agroconnect
  source:
    repoURL: https://github.com/yormengh/agritech.git
    targetRevision: main
    path: k8s/overlays/production
  destination:
    server: https://kubernetes.default.svc
    namespace: agroconnect
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 3
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas   # HPA manages replicas

---
# Staging application
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: agroconnect-staging
  namespace: argocd
spec:
  project: agroconnect
  source:
    repoURL: https://github.com/yormengh/agritech.git
    targetRevision: develop
    path: k8s/overlays/staging
  destination:
    server: https://kubernetes.default.svc
    namespace: agroconnect-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
