groups:
  - name: agroconnect.backend
    interval: 30s
    rules:

      - alert: BackendDown
        expr: up{job="agroconnect-backend"} == 0
        for: 1m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "AgroConnect backend is DOWN"
          description: "The backend API has been unreachable for more than 1 minute."
          runbook: "https://wiki.agroconnect.gh/runbooks/backend-down"

      - alert: HighErrorRate
        expr: |
          rate(http_requests_total{job="agroconnect-backend",status=~"5.."}[5m])
          /
          rate(http_requests_total{job="agroconnect-backend"}[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "High HTTP 5xx error rate ({{ $value | humanizePercentage }})"
          description: "More than 5% of requests are returning 5xx errors."

      - alert: HighLatency
        expr: |
          histogram_quantile(0.95,
            rate(http_request_duration_seconds_bucket{job="agroconnect-backend"}[5m])
          ) > 2
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "High p95 latency ({{ $value }}s)"
          description: "95th percentile response time exceeded 2 seconds."

      - alert: PodCrashLooping
        expr: |
          increase(kube_pod_container_status_restarts_total{namespace="agroconnect"}[15m]) > 3
        for: 0m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Pod {{ $labels.pod }} is crash looping"
          description: "Container {{ $labels.container }} restarted {{ $value }} times in 15 minutes."

      - alert: PodNotReady
        expr: |
          kube_pod_status_ready{namespace="agroconnect", condition="true"} == 0
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Pod {{ $labels.pod }} not ready"
          description: "Pod has been in non-ready state for 5 minutes."

  - name: agroconnect.database
    rules:

      - alert: PostgreSQLDown
        expr: pg_up == 0
        for: 1m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "PostgreSQL is DOWN"
          description: "Cannot connect to the PostgreSQL database."

      - alert: PostgreSQLHighConnections
        expr: pg_stat_database_numbackends / pg_settings_max_connections > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL connection pool near limit ({{ $value | humanizePercentage }})"

  - name: agroconnect.infrastructure
    rules:

      - alert: NodeHighCPU
        expr: 100 - (avg by(node) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Node {{ $labels.node }} high CPU ({{ $value }}%)"

      - alert: NodeHighMemory
        expr: (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 > 85
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Node {{ $labels.node }} high memory ({{ $value }}%)"

      - alert: NodeDiskPressure
        expr: (1 - node_filesystem_avail_bytes / node_filesystem_size_bytes) * 100 > 80
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Disk usage at {{ $value }}% on {{ $labels.node }}"

      - alert: KarpenterNodeProvisioningFailed
        expr: karpenter_nodes_total{reason="failed"} > 0
        for: 2m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Karpenter failed to provision nodes"
