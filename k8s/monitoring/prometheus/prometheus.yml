global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: agroconnect-local
    environment: local

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - "alerts/*.yml"

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  - job_name: agroconnect-backend
    static_configs:
      - targets: [backend:4000]
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: node-exporter
    static_configs:
      - targets: [node-exporter:9100]

  - job_name: cadvisor
    static_configs:
      - targets: [cadvisor:8080]
    metrics_path: /metrics
    scheme: http
