[extend]
useDefault = true

[[rules]]
id          = "hubtel-credentials"
description = "Hubtel API credentials"
regex       = '''(?i)(hubtel[_\-]?(client[_\-]?id|client[_\-]?secret|api[_\-]?key))\s*[=:]\s*['\"]?([a-zA-Z0-9\-_]{20,})['\"]?'''
tags        = ["hubtel", "ghana", "sms"]

[[rules]]
id          = "aws-connection-string"
description = "AWS RDS connection string with credentials"
regex       = '''postgresql://[^:]+:[^@]+@[a-z0-9\-\.]+\.rds\.amazonaws\.com'''
tags        = ["aws", "rds", "database"]

[allowlist]
  description = "Allowlisted patterns"
  regexes = [
    '''localdev_secret''',
    '''your_password_here''',
    '''yourpassword''',
    '''CHANGE_ME''',
    '''example\.com''',
    '''localhost''',
  ]
  paths = [
    '''.env.example''',
    '''README.md''',
    '''docs/.*''',
  ]
